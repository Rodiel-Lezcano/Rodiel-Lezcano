<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="200" viewBox="0 0 1200 200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0e4f5c"/>
      <stop offset="50%" style="stop-color:#0a3d47"/>
      <stop offset="100%" style="stop-color:#0891b2"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0891b2;stop-opacity:0.3"/>
      <stop offset="50%" style="stop-color:#0891b2;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#0891b2;stop-opacity:0.3"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="200" fill="url(#bg)"/>

  <!-- Grid pattern (infrastructure/architecture feel) -->
  <g opacity="0.06" stroke="#ffffff" stroke-width="0.5">
    <line x1="0" y1="40" x2="1200" y2="40"/>
    <line x1="0" y1="80" x2="1200" y2="80"/>
    <line x1="0" y1="120" x2="1200" y2="120"/>
    <line x1="0" y1="160" x2="1200" y2="160"/>
    <line x1="100" y1="0" x2="100" y2="200"/>
    <line x1="200" y1="0" x2="200" y2="200"/>
    <line x1="300" y1="0" x2="300" y2="200"/>
    <line x1="400" y1="0" x2="400" y2="200"/>
    <line x1="500" y1="0" x2="500" y2="200"/>
    <line x1="600" y1="0" x2="600" y2="200"/>
    <line x1="700" y1="0" x2="700" y2="200"/>
    <line x1="800" y1="0" x2="800" y2="200"/>
    <line x1="900" y1="0" x2="900" y2="200"/>
    <line x1="1000" y1="0" x2="1000" y2="200"/>
    <line x1="1100" y1="0" x2="1100" y2="200"/>
  </g>

  <!-- Cloud shapes (left side) -->
  <g opacity="0.08" fill="#ffffff">
    <circle cx="80" cy="55" r="22"/>
    <circle cx="105" cy="50" r="28"/>
    <circle cx="135" cy="55" r="22"/>
    <rect x="65" y="55" width="85" height="18" rx="4"/>
  </g>
  <g opacity="0.05" fill="#ffffff">
    <circle cx="1050" cy="145" r="18"/>
    <circle cx="1072" cy="140" r="24"/>
    <circle cx="1098" cy="145" r="18"/>
    <rect x="1038" y="145" width="72" height="15" rx="4"/>
  </g>

  <!-- Network nodes (architecture topology) -->
  <g opacity="0.12">
    <!-- Left cluster -->
    <circle cx="160" cy="150" r="4" fill="#0891b2"/>
    <circle cx="200" cy="135" r="4" fill="#0891b2"/>
    <circle cx="185" cy="170" r="4" fill="#0891b2"/>
    <line x1="160" y1="150" x2="200" y2="135" stroke="#0891b2" stroke-width="1"/>
    <line x1="160" y1="150" x2="185" y2="170" stroke="#0891b2" stroke-width="1"/>
    <line x1="200" y1="135" x2="185" y2="170" stroke="#0891b2" stroke-width="1"/>

    <!-- Right cluster -->
    <circle cx="1020" cy="50" r="4" fill="#0891b2"/>
    <circle cx="1055" cy="35" r="4" fill="#0891b2"/>
    <circle cx="1060" cy="65" r="4" fill="#0891b2"/>
    <circle cx="1090" cy="50" r="4" fill="#0891b2"/>
    <line x1="1020" y1="50" x2="1055" y2="35" stroke="#0891b2" stroke-width="1"/>
    <line x1="1020" y1="50" x2="1060" y2="65" stroke="#0891b2" stroke-width="1"/>
    <line x1="1055" y1="35" x2="1090" y2="50" stroke="#0891b2" stroke-width="1"/>
    <line x1="1060" y1="65" x2="1090" y2="50" stroke="#0891b2" stroke-width="1"/>
  </g>

  <!-- Kubernetes wheel icon (subtle, left) -->
  <g transform="translate(90, 130)" opacity="0.08" fill="none" stroke="#ffffff" stroke-width="1.5">
    <circle cx="0" cy="0" r="14"/>
    <circle cx="0" cy="0" r="5"/>
    <line x1="0" y1="-14" x2="0" y2="-5"/>
    <line x1="0" y1="14" x2="0" y2="5"/>
    <line x1="-12" y1="-7" x2="-4.3" y2="-2.5"/>
    <line x1="12" y1="-7" x2="4.3" y2="-2.5"/>
    <line x1="-12" y1="7" x2="-4.3" y2="2.5"/>
    <line x1="12" y1="7" x2="4.3" y2="2.5"/>
  </g>

  <!-- Shield icon (subtle, right - security) -->
  <g transform="translate(1120, 90)" opacity="0.08" fill="none" stroke="#ffffff" stroke-width="1.5">
    <path d="M0,-16 L12,-10 L12,2 C12,10 0,18 0,18 C0,18 -12,10 -12,2 L-12,-10 Z"/>
    <polyline points="-4,0 -1,4 6,-4" stroke-width="2"/>
  </g>

  <!-- Glow line -->
  <rect x="300" y="130" width="600" height="1" fill="url(#glow)" rx="1"/>

  <!-- Main text -->
  <text x="600" y="75" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="42" font-weight="700" fill="#ffffff" text-anchor="middle" letter-spacing="2">
    Rodiel Lezcano
  </text>

  <!-- Subtitle -->
  <text x="600" y="115" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="16" font-weight="400" fill="#0891b2" text-anchor="middle" letter-spacing="3">
    SOLUTIONS ARCHITECT  ·  CLOUD &amp; AI  ·  IaC AUTOMATION
  </text>

  <!-- Bottom accent line -->
  <rect x="0" y="196" width="1200" height="4" fill="#0891b2" opacity="0.6"/>
</svg>
